name: Fetch POE2 Market Data

on:
  schedule:
    # 매일 한국시간 21:30 실행
    # GitHub Actions cron은 UTC 기준입니다.
    # 12:30 UTC = 21:30 KST
    - cron: '30 12 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-poe2-market:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fetch POE2 market data
        run: npm run fetch:poe2

      - name: Check generated data changes
        id: git-check
        run: |
          git status --short
          if [ -n "$(git status --short data/generated)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit generated data
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/generated
          git commit -m "Update POE2 market data"
          git push