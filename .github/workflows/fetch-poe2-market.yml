name: Fetch POE2 Korean Market Data

on:
  schedule:
    # 한국 데이터 수집: 매주 월·수·금 오전 08:00 KST 실행
    # GitHub Actions cron은 UTC 기준입니다.
    # 23:00 UTC = 다음날 08:00 KST
    # 일요일 23:00 UTC = 월요일 08:00 KST
    # 화요일 23:00 UTC = 수요일 08:00 KST
    # 목요일 23:00 UTC = 금요일 08:00 KST
    - cron: '0 23 * * 0,2,4'

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-poe2-korean-market-data
  cancel-in-progress: false

jobs:
  collect-base:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Clean previous Korean raw data
        run: npx tsx scripts/fetch-poe2-market.ts --mode=clean --locale=ko

      - name: Collect base group 1
        run: npx tsx scripts/fetch-poe2-market.ts --mode=collect --target=base --group=1 --locale=ko

      - name: Wait before base group 2
        run: sleep 900

      - name: Collect base group 2
        run: npx tsx scripts/fetch-poe2-market.ts --mode=collect --target=base --group=2 --locale=ko

      - name: Wait before base group 3
        run: sleep 900

      - name: Collect base group 3
        run: npx tsx scripts/fetch-poe2-market.ts --mode=collect --target=base --group=3 --locale=ko

      - name: Wait before base group 4
        run: sleep 900

      - name: Collect base group 4
        run: npx tsx scripts/fetch-poe2-market.ts --mode=collect --target=base --group=4 --locale=ko

      - name: Wait before base group 5
        run: sleep 900

      - name: Collect base group 5
        run: npx tsx scripts/fetch-poe2-market.ts --mode=collect --target=base --group=5 --locale=ko

      - name: Wait before base group 6
        run: sleep 900

      - name: Collect base group 6
        run: npx tsx scripts/fetch-poe2-market.ts --mode=collect --target=base --group=6 --locale=ko

      - name: Wait before base group 7
        run: sleep 900

      - name: Collect base group 7
        run: npx tsx scripts/fetch-poe2-market.ts --mode=collect --target=base --group=7 --locale=ko

      - name: Check base raw data
        run: |
          RAW_DIR="data/generated/raw/ko"
          ls -R "$RAW_DIR"
          test -f "$RAW_DIR/base-1.json"
          test -f "$RAW_DIR/base-2.json"
          test -f "$RAW_DIR/base-3.json"
          test -f "$RAW_DIR/base-4.json"
          test -f "$RAW_DIR/base-5.json"
          test -f "$RAW_DIR/base-6.json"
          test -f "$RAW_DIR/base-7.json"

      - name: Upload base raw artifact
        uses: actions/upload-artifact@v4
        with:
          name: poe2-base-raw-ko
          path: data/generated/raw/ko
          retention-days: 1

  collect-unique-rare-build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    needs:
      - collect-base

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Prepare Korean raw directory
        run: mkdir -p data/generated/raw/ko

      - name: Download base raw artifact
        uses: actions/download-artifact@v4
        with:
          name: poe2-base-raw-ko
          path: data/generated/raw/ko

      - name: Check downloaded base raw data
        run: |
          RAW_DIR="data/generated/raw/ko"
          ls -R "$RAW_DIR"
          test -f "$RAW_DIR/base-1.json"
          test -f "$RAW_DIR/base-2.json"
          test -f "$RAW_DIR/base-3.json"
          test -f "$RAW_DIR/base-4.json"
          test -f "$RAW_DIR/base-5.json"
          test -f "$RAW_DIR/base-6.json"
          test -f "$RAW_DIR/base-7.json"

      - name: Collect unique data
        run: npx tsx scripts/fetch-poe2-market.ts --mode=collect --target=unique --locale=ko

      - name: Wait before rare group 1
        run: sleep 600

      - name: Collect rare group 1
        run: npx tsx scripts/fetch-poe2-market.ts --mode=collect --target=rare --group=1 --locale=ko

      - name: Wait before rare group 2
        run: sleep 600

      - name: Collect rare group 2
        run: npx tsx scripts/fetch-poe2-market.ts --mode=collect --target=rare --group=2 --locale=ko

      - name: Wait before rare group 3
        run: sleep 600

      - name: Collect rare group 3
        run: npx tsx scripts/fetch-poe2-market.ts --mode=collect --target=rare --group=3 --locale=ko

      - name: Wait before rare group 4
        run: sleep 600

      - name: Collect rare group 4
        run: npx tsx scripts/fetch-poe2-market.ts --mode=collect --target=rare --group=4 --locale=ko

      - name: Wait before rare group 5
        run: sleep 600

      - name: Collect rare group 5
        run: npx tsx scripts/fetch-poe2-market.ts --mode=collect --target=rare --group=5 --locale=ko

      - name: Wait before rare group 6
        run: sleep 600

      - name: Collect rare group 6
        run: npx tsx scripts/fetch-poe2-market.ts --mode=collect --target=rare --group=6 --locale=ko

      - name: Wait before rare group 7
        run: sleep 600

      - name: Collect rare group 7
        run: npx tsx scripts/fetch-poe2-market.ts --mode=collect --target=rare --group=7 --locale=ko

      - name: Check all Korean raw data before build
        run: |
          RAW_DIR="data/generated/raw/ko"
          ls -R "$RAW_DIR"
          test -f "$RAW_DIR/unique.json"
          test -f "$RAW_DIR/base-1.json"
          test -f "$RAW_DIR/base-2.json"
          test -f "$RAW_DIR/base-3.json"
          test -f "$RAW_DIR/base-4.json"
          test -f "$RAW_DIR/base-5.json"
          test -f "$RAW_DIR/base-6.json"
          test -f "$RAW_DIR/base-7.json"

      - name: Build final Korean POE2 market data
        run: npx tsx scripts/fetch-poe2-market.ts --mode=build --locale=ko

      - name: Check generated Korean data changes
        id: git-check
        run: |
          git status --short

          MARKET_FILE="data/generated/poe2-market-ko.json"
          HISTORY_DIR="data/generated/history/ko"

          if [ -n "$(git status --short "$MARKET_FILE" "$HISTORY_DIR")" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit generated Korean data
        if: steps.git-check.outputs.changed == 'true'
        run: |
          MARKET_FILE="data/generated/poe2-market-ko.json"
          HISTORY_DIR="data/generated/history/ko"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "$MARKET_FILE" "$HISTORY_DIR"
          git commit -m "Update POE2 Korean market data"
          git push